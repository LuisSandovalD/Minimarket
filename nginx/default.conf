server {
    listen 80;

    # Si alguien entra a la raíz, mándalo al Frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Si alguien entra a /api, mándalo al Backend
    location /api {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Para tu Health Check
    location /health {
        proxy_pass http://backend:4000/health;
    }
}